version: '3.8'

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=19012004
      - MYSQL_DATABASE=bookstore
      - MYSQL_ALLOW_EMPTY_PASSWORD=false
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - bookstore-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 30s
      retries: 15
      start_period: 40s

  auth-service:
    build: ./auth-service
    ports:
      - "8012:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=auth_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - customer_data:/app/data
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=customer_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  staff-service:
    build: ./staff-service
    ports:
      - "8005:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=staff_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  manager-service:
    build: ./manager-service
    ports:
      - "8006:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=manager_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  catalog-service:
    build: ./catalog-service
    ports:
      - "8007:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=catalog_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  book-service:
    build: ./book-service
    ports:
      - "8002:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=book_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    depends_on:
      mysql:
        condition: service_healthy
      customer-service:
        condition: service_started
      book-service:
        condition: service_started
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=cart_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  order-service:
    build: ./order-service
    ports:
      - "8004:8000"
    depends_on:
      mysql:
        condition: service_healthy
      cart-service:
        condition: service_started
      book-service:
        condition: service_started
      pay-service:
        condition: service_started
      ship-service:
        condition: service_started
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=order_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  pay-service:
    build: ./pay-service
    ports:
      - "8008:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=pay_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  ship-service:
    build: ./ship-service
    ports:
      - "8009:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=ship_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  comment-rate-service:
    build: ./comment-rate-service
    ports:
      - "8010:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=comment_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  recommender-ai-service:
    build: ./recommender-ai-service
    ports:
      - "8011:8000"
    depends_on:
      mysql:
        condition: service_healthy
      comment-rate-service:
        condition: service_started
      book-service:
        condition: service_started
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=recommender_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      book-service:
        condition: service_started
      customer-service:
        condition: service_started
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=bookstore
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

  saga-service:
    build: ./saga-service
    ports:
      - "8013:8000"
    depends_on:
      mysql:
        condition: service_healthy
      order-service:
        condition: service_started
    environment:
      - JWT_SECRET=bookstore-secret-2024
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=saga_db
      - DB_USER=root
      - DB_PASSWORD=19012004
    networks:
      - bookstore-net

volumes:
  customer_data:
  db_data:

networks:
  bookstore-net:
    driver: bridge