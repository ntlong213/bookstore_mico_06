<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo đơn hàng — BookStore Staff</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --border: #e2e8f0;
      --accent: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background-color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .order-wrap {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
      border: 1px solid var(--border);
    }
    
    .order-header {
      padding: 32px 40px 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: #f1f5f9;
    }
    .icon-wrap {
      width: 64px; height: 64px;
      background: rgba(79, 70, 229, 0.1);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: var(--primary);
      margin: 0 auto 16px;
    }
    .order-header h1 { font-family: 'Outfit', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .order-header p { color: var(--text-muted); font-size: 0.95rem; }
    
    .order-body { padding: 32px 40px; }
    
    .info-box {
      background: #eff6ff;
      border-left: 4px solid #3b82f6;
      border-radius: 0 8px 8px 0;
      padding: 14px 16px;
      margin-bottom: 24px;
      display: flex; align-items: flex-start; gap: 12px;
      font-size: 0.9rem; color: #1e3a8a;
      line-height: 1.5;
    }
    
    .form-group { margin-bottom: 20px; }
    .bs-label {
      font-weight: 600; font-size: 0.85rem; color: var(--text);
      margin-bottom: 8px; display: block;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 1rem; transition: color 0.3s;
    }
    .bs-input {
      width: 100%; padding: 12px 16px 12px 42px;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.95rem; font-family: 'Inter', sans-serif; background: #f8fafc;
      transition: all 0.2s; color: var(--text);
    }
    .bs-input:focus {
      border-color: var(--primary); outline: none; background: white;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    .bs-input:focus + .input-icon, .input-wrap:focus-within .input-icon { color: var(--primary); }

    .pay-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
    .pay-method-label {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px;
      cursor: pointer; transition: all 0.2s; font-size: 0.9rem; font-weight: 500;
      color: var(--text); background: white;
    }
    .pay-method-label:hover { border-color: #cbd5e1; background: #f8fafc; }
    .pay-method-label:has(input:checked) {
      border-color: var(--primary); background: rgba(79, 70, 229, 0.05); color: var(--primary);
      box-shadow: 0 2px 4px rgba(79, 70, 229, 0.05);
    }
    .pay-method-label input { display: none; }
    .pay-icon { font-size: 1.2rem; display: flex; align-items: center; justify-content: center; width: 24px; }
    
    .btn-create {
      width: 100%; padding: 14px; margin-top: 12px;
      background: var(--primary); color: white; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-create:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(79, 70, 229, 0.25); }
    
    .alert-success { background: #dcfce7; border: 1px solid #bbf7d0; color: #166534; padding: 14px 16px; border-radius: 10px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; font-size: 0.95rem; font-weight: 500; }
    
    .order-footer {
      text-align: center; padding: 20px;
      background: #f8fafc; border-top: 1px solid var(--border);
    }
    .order-footer a {
      color: var(--text-muted); font-weight: 500; font-size: 0.9rem;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .order-footer a:hover { color: var(--primary); }
  </style>
</head>
<body>

<div class="order-wrap">
  <div class="order-header">
    <div class="icon-wrap"><i class="fas fa-file-invoice"></i></div>
    <h1>Tạo đơn hàng mới</h1>
    <p>Xử lý giao dịch thủ công qua Staff Panel</p>
  </div>

  <div class="order-body">
    <div class="info-box">
      <i class="fas fa-info-circle fs-5" style="margin-top: 2px;"></i>
      <span>Vui lòng điền thông tin ID khách hàng để gán đơn hàng cho họ. Bạn có thể tra cứu Customer ID ở mục Danh sách Khách hàng.</span>
    </div>

    {% if message %}
    <div class="alert-success"><i class="fas fa-check-circle fs-5"></i> <span>{{ message }}</span></div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="bs-label" for="customer_id">ID Khách hàng</label>
        <div class="input-wrap">
          <i class="fas fa-hashtag input-icon"></i>
          <input class="bs-input" type="number" id="customer_id" name="customer_id" placeholder="Ex: 1, 2, 3..." required>
        </div>
      </div>

      <div class="form-group">
        <label class="bs-label">Phương thức Thanh toán</label>
        <div class="pay-methods">
          <label class="pay-method-label">
            <input type="radio" name="payment_method" value="credit_card" required>
            <span class="pay-icon">💳</span> <span style="flex:1;">Thẻ tín dụng</span>
          </label>
          <label class="pay-method-label">
            <input type="radio" name="payment_method" value="bank_transfer">
            <span class="pay-icon">🏦</span> <span style="flex:1;">Chuyển khoản</span>
          </label>
          <label class="pay-method-label">
            <input type="radio" name="payment_method" value="paypal">
            <span class="pay-icon" style="color:#003087;"><i class="fab fa-paypal"></i></span> <span style="flex:1;">PayPal</span>
          </label>
          <label class="pay-method-label">
            <input type="radio" name="payment_method" value="cash">
            <span class="pay-icon" style="color:#16a34a;"><i class="fas fa-money-bill-wave"></i></span> <span style="flex:1;">Tiền mặt (COD)</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="bs-label" for="shipping_address">Địa chỉ Giao hàng</label>
        <div class="input-wrap">
          <i class="fas fa-map-marker-alt input-icon"></i>
          <input class="bs-input" type="text" id="shipping_address" name="shipping_address" placeholder="123 Đường ABC, Phường X, Quận Y..." required>
        </div>
      </div>

      <button type="submit" class="btn-create"><i class="fas fa-plus-circle"></i> Xác nhận Tạo đơn</button>
    </form>
  </div>

  <div class="order-footer">
    <a href="/staff/"><i class="fas fa-arrow-left"></i> Quay lại Bảng điều khiển</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
